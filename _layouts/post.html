<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} - {{ site.title }}</title>
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  {% seo %}
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ '/about' | relative_url }}">关于</a>
        <a href="{{ '/articles' | relative_url }}">已发表</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    <div class="container" style="max-width: 720px">
      <article style="padding: 2rem 0">
        <header style="margin-bottom: 2.5rem; padding-bottom:1.5rem; border-bottom:1px solid var(--color-border)">
          <div style="font-size:0.8rem; color:var(--color-text-light); margin-bottom:0.5rem">
            {% if page.topic %}{{ page.topic }} · {% endif %}{{ page.date | date: "%Y-%m-%d" }}
            {% if page.platforms %} · {{ page.platforms | join: ", " }}{% endif %}
          </div>
          <h1 style="font-family:var(--font-serif); font-size:2rem; font-weight:700; line-height:1.3; color:var(--color-text)">{{ page.title }}</h1>
        </header>

        <div class="article-content">
          {{ content }}
        </div>

        <footer style="margin-top:3rem; padding-top:1.5rem; border-top:1px solid var(--color-border)">
          <a href="/articles" style="font-size:0.9rem">← 返回已发表</a>
        </footer>
      </article>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; {{ site.time | date: '%Y' }} {{ site.author }}. 用AI放大一个人的声音。</p>
    </div>
  </footer>
</body>
</html>
