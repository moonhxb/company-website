<style>/* 东方智慧 */
:root{--bg:#faf9f7;--text:#2c2c2c;--text-light:#666;--accent:#b35c2a;--border:#e0ddd8;--card:#fff;--serif:'Noto Serif SC',Georgia,serif;--sans:'Noto Sans SC',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:16px;line-height:1.8;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}a:hover{color:#8b4513;text-decoration:underline}
img{max-width:100%;display:block}
.container{max-width:800px;margin:0 auto;padding:0 1.5rem}
.site-header{background:var(--card);border-bottom:1px solid var(--border);padding:1.2rem 0;position:sticky;top:0;z-index:100}
.site-header .container{display:flex;align-items:center;justify-content:space-between}
.site-title{font-family:var(--serif);font-size:1.4rem;font-weight:700;color:var(--accent);letter-spacing:.05em}
.site-title:hover{color:#8b4513;text-decoration:none}
.site-nav{display:flex;gap:2rem}
.site-nav a{font-size:.9rem;font-weight:500;color:var(--text-light);letter-spacing:.04em;transition:color .2s}
.site-nav a:hover{color:var(--accent);text-decoration:none}
.site-main{min-height:60vh;padding:3rem 0}
.site-footer{background:var(--card);border-top:1px solid var(--border);padding:2rem 0;margin-top:4rem}
.footer-inner{text-align:center;font-size:.8rem;color:var(--text-light);line-height:2}
.footer-inner p{margin-bottom:.3rem}
.disclaimer{background:#fdf5ee;border:1px solid #e8c9a8;border-radius:4px;padding:1rem 1.2rem;margin-top:1rem;font-size:.78rem;color:#7a5a3a;line-height:1.7}
.hero{text-align:center;padding:4rem 0 3rem;border-bottom:1px solid var(--border);margin-bottom:3rem}
.hero-title{font-family:var(--serif);font-size:2.8rem;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:.8rem;letter-spacing:.03em}
.hero-subtitle{font-size:1.1rem;color:var(--text-light);font-weight:300;margin-bottom:2rem}
.hero-cta{display:inline-block;background:var(--accent);color:#fff;padding:.55rem 1.6rem;border-radius:2rem;font-size:.88rem;font-weight:500;letter-spacing:.06em}
.hero-cta:hover{background:#8b4513;color:#fff;text-decoration:none}
.page-header{margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
.page-title{font-family:var(--serif);font-size:2rem;font-weight:700;color:var(--text);margin-bottom:.5rem}
.page-desc{color:var(--text-light);font-size:.95rem}
.articles-list{display:flex;flex-direction:column;gap:1.5rem}
.article-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:1.5rem 1.8rem;transition:box-shadow .2s}
.article-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.07);border-color:#d4b896}
.article-card h2{font-family:var(--serif);font-size:1.2rem;font-weight:700;margin-bottom:.5rem}
.article-card h2 a{color:var(--text)}
.article-card h2 a:hover{color:var(--accent);text-decoration:none}
.article-meta{font-size:.8rem;color:var(--text-light);margin-bottom:.8rem}
.article-excerpt{font-size:.92rem;color:var(--text-light);line-height:1.7}
.topics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem;margin-top:2rem}
.topic-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:1.2rem;text-align:center;transition:all .2s;display:block}
.topic-card:hover{border-color:var(--accent);box-shadow:0 3px 12px rgba(179,92,42,.1);text-decoration:none}
.topic-name{font-weight:600;font-size:.95rem;color:var(--text);margin-bottom:.3rem;display:block}
.topic-count{font-size:.75rem;color:var(--text-light);display:block}
.about-section{margin-bottom:2.2rem}
.about-section h2{font-family:var(--serif);font-size:1.25rem;font-weight:700;margin-bottom:.8rem;padding-bottom:.4rem;border-bottom:2px solid var(--accent);display:inline-block;color:var(--text)}
.about-section p{color:var(--text-light);line-height:1.9}
.about-section ul{margin-left:1.5rem;margin-top:.8rem;display:flex;flex-direction:column;gap:.4rem}
.about-section li{color:var(--text-light);line-height:1.7}
.contact-row{display:flex;align-items:center;gap:.6rem;margin-top:.4rem;font-size:.92rem}
.contact-label{font-weight:600;color:var(--text);min-width:3rem}
.contact-value{color:var(--accent)}
.section-divider{border:none;border-top:1px solid var(--border);margin:2.5rem 0}
@media(max-width:600px){.hero-title{font-size:2rem}.site-nav{gap:1.2rem}.topics-grid{grid-template-columns:repeat(2,1fr)}}
</style>
